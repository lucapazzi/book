<!DOCTYPE html>
<html lang="it"><head><meta charset="utf-8">
<title>Prova R6 — workflow SVG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500&display=swap');
body{font-family:'Source Serif 4',Georgia,serif;color:#1a1a1a;line-height:1.6;margin:0;padding:2rem}
.page{max-width:820px;margin:0 auto}
code{font-family:'Source Code Pro',monospace;font-size:.9em}
h1{font-size:1.5rem}
figure{margin:2rem 0;border:1px solid #d4d0c8;border-radius:6px;padding:1rem;background:#fff}
figure img{display:block;width:100%;height:auto}
figcaption{margin-top:.8rem;font-size:.9rem;color:#444;line-height:1.55}
.repro{display:block;margin-top:.4rem;font-size:.85rem;color:#666}
</style></head>
<body><div class="page">
<h1>Prova R6 — workflow SVG (file di prova)</h1>
<p>Test del workflow: <code>pws_export svg</code> dai tre <code>.pws</code>, referenziati come file esterni.</p>

<figure>
<img src="valid.svg" alt="R6 Valid — controller a due stati Ready/Work">
<figcaption><strong>Valid.</strong> <code>start</code> emette <code>&#10216;laser.on&#10217;</code> e <code>stop</code> emette <code>&#10216;laser.off&#10217;</code> — entrambe fireable, in <strong>nero</strong>. Report pulito. <span class="repro">Fonte: <code>pws-examples/laserCover-base.pws</code></span></figcaption>
</figure>

<figure>
<img src="orphan.svg" alt="R6 Orphan — azione orfana">
<figcaption><strong>Orphan.</strong> L'azione di <code>start</code> &egrave; svuotata, quindi <code>Work</code> raggiunge <code>(Closed, Off)</code> violando <code>Sem = (Closed, On)</code> (<span style="color:#c62828">rosso</span>); <code>stop</code>&rsquo;s <code>&#10216;laser.off&#10217;</code> diventa azione <em>orfana</em> (<span style="color:#c62828">rosso</span>). <span class="repro">Fonte: <code>pws-examples/laserCover-R6-orphan-action.pws</code></span></figcaption>
</figure>

<figure>
<img src="provisional.svg" alt="R6 Provisional — stato non raggiungibile">
<figcaption><strong>Provisional.</strong> <code>start</code> &egrave; guardata <code>[FALSE]</code>, quindi <code>Work</code> &egrave; <em>non raggiungibile</em> (oro); <code>stop</code>&rsquo;s <code>&#10216;laser.off&#10217;</code> &egrave; validata solo su <code>Sem</code> e resa <strong style="color:#1a5ab8">blu</strong> (provvisoria); <code>start</code>&rsquo;s <code>&#10216;laser.on&#10217;</code> &egrave; <span style="color:#c62828">orfana</span>. <span class="repro">Fonte: <code>pws-examples/laserCover-R6-unreachable-provisional.pws</code></span></figcaption>
</figure>

</div></body></html>
